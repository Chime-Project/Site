<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chime Health — Weight Loss</title>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#5E93D1"></rect><circle cx="50" cy="50" r="20" fill="none" stroke="#FFFEFB" stroke-width="3"></circle><circle cx="50" cy="50" r="12" fill="none" stroke="#C3D7EE" stroke-width="3"></circle><circle cx="50" cy="50" r="5" fill="#FFFEFB"></circle></svg></template>
<link rel="stylesheet" href="styles.css">
<script src="tailwind.setup.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="dsbundle.js"></script>
<script src="ui_kits/homepage/image-slot.js"></script>
<script>window.CHIME_UPLOADS_BASE = "uploads"; window.CHIME_ASSETS_BASE = "assets";</script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-default); padding-top: 72px; }
  a { color: var(--accent-strong); }
  a:hover { color: var(--accent-default); }

  /* ---- Nav + footer (shared with homepage) ---- */
  @media (max-width: 960px) {
    .nav-links { display: none !important; }
    .nav-bar { display: flex !important; justify-content: space-between !important; align-items: center !important; }
    .nav-actions { order: -1; }
    .nav-logo { order: 2; margin-inline-start: 0 !important; }
    .nav-login { display: none !important; }
    .footer-grid { grid-template-columns: 1fr !important; }
  }
  /* Nav: hide hamburger + stale-open mobile menu on desktop (no JS resize listener). */
  @media (min-width: 961px) {
    .nav-hamburger { display: none !important; }
    .nav-mobile-menu { display: none !important; }
  }
  /* Weight Loss calculator grids — columns owned here (not Tailwind utilities)
     so they don't depend on Play-CDN utility ordering. */
  .wl-calc-grid { grid-template-columns: 1fr; }
  .wl-calc-milestones { grid-template-columns: 1fr; }
  @media (min-width: 561px) { .wl-calc-milestones { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 961px) { .wl-calc-grid { grid-template-columns: minmax(260px, 340px) 1fr; } }
  /* Section scroll-reveal — pure CSS scroll-driven animation (replaces the
     per-section IntersectionObserver). Unsupported browsers rest at the end
     state (visible), so content is never stuck hidden. */
  @keyframes chime-reveal {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .reveal {
      animation: chime-reveal linear both;
      animation-timeline: view();
      animation-range: entry 2% cover 22%;
    }
  }

  /* ---- Weight Loss sections ---- */
  @media (max-width: 960px) {
    .wlh-bento > div { grid-column: span 12 !important; }
    .wlh-tile-img { height: auto !important; aspect-ratio: 4 / 3 !important; }
    .wlh-tile-video { aspect-ratio: 3 / 4 !important; }
    .wlh-benefits { grid-template-columns: 1fr !important; }
    .wlb-grid { grid-template-columns: 1fr !important; }
    .wlt-panel { grid-template-columns: 1fr !important; gap: var(--spacing-8) !important; padding: var(--spacing-8) var(--spacing-6) !important; }
    .wl-calc-grid { grid-template-columns: 1fr !important; }
    .path-section { padding-inline: var(--spacing-5) !important; }
    .path-title { font-size: var(--text-4xl) !important; }
    .path-grid { grid-template-columns: 1fr 1fr !important; }
    .guide-section { padding-inline: var(--spacing-5) !important; }
    .guide-content { padding: var(--spacing-8) var(--spacing-6) !important; }
  }
  @media (max-width: 560px) {
    .path-grid { grid-template-columns: 1fr !important; }
  }
  @keyframes hero-enter {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .hero-enter { animation: hero-enter 0.7s var(--ease-out, ease-out) both; }
    .wlb-item { animation: wlb-wave 4.5s var(--ease-in-out) infinite; }
    @keyframes wlb-wave {
      0%, 100% { transform: translateY(0); }
      8% { transform: translateY(-5px); }
      16% { transform: translateY(0); }
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<!-- Main menu -->
<script type="text/babel" src="ui_kits/homepage/Navbar.jsx"></script>
<!-- Weight Loss sections + shared building blocks (WLProductCarousel / WLReveal / WLButton) -->
<script type="text/babel" src="ui_kits/shared/WLCalculator.jsx"></script>
<script type="text/babel" src="ui_kits/weight-loss/WLShared.jsx"></script>
<script type="text/babel" src="ui_kits/weight-loss/WeightLossHero.jsx"></script>
<script type="text/babel" src="ui_kits/weight-loss/WLBodiesSection.jsx"></script>
<script type="text/babel" src="ui_kits/weight-loss/WLTimelineSection.jsx"></script>
<script type="text/babel" src="ui_kits/weight-loss/WLCalculatorSection.jsx"></script>
<script type="text/babel" src="ui_kits/homepage/PathSection.jsx"></script>
<script type="text/babel" src="ui_kits/homepage/GuideSection.jsx"></script>
<!-- Footer + assessment modal -->
<script type="text/babel" src="ui_kits/homepage/Footer.jsx"></script>
<script type="text/babel" src="ui_kits/homepage/AssessmentModal.jsx"></script>
<script type="text/babel">
function WeightLossPage() {
  return (
    <React.Fragment>
      <ChimeNavbar />
      <main>
        <ChimeWeightLossHero />
        <WLBodiesSection />
        <WLTimelineSection />
        <WLCalculatorSection />
        <ChimePathSection />
        <ChimeGuideSection />
      </main>
      <ChimeFooter />
      <ChimeAssessmentModal />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<WeightLossPage />);
</script>
</body>
</html>
