<!DOCTYPE html>
<html lang="en" data-theme="default">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chime Health — Terms &amp; Conditions</title>
<link rel="stylesheet" href="styles.css?v=20260738">
<script src="tailwind.setup.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="dsbundle.js"></script>
<script>window.CHIME_UPLOADS_BASE = "uploads"; window.CHIME_ASSETS_BASE = "assets";</script>
<style>
  html, body { margin: 0; }
  body { background: var(--bg-default); padding-top: 72px; }
  a { color: var(--accent-strong); }
  a:hover { color: var(--accent-default); }

  /* ---- Nav + footer (shared with homepage) ---- */
  @media (max-width: 960px) {
    .nav-links { display: none !important; }
    .nav-bar { display: flex !important; justify-content: space-between !important; align-items: center !important; }
    .nav-actions { order: -1; }
    .nav-logo { order: 2; margin-inline-start: 0 !important; }
    .nav-login { display: none !important; }
    .footer-grid { grid-template-columns: 1fr !important; }
  }
  @media (min-width: 961px) {
    .nav-hamburger { display: none !important; }
    .nav-mobile-menu { display: none !important; }
  }
  /* Legal prose: tighten the gutters and title on small screens. */
  @media (max-width: 560px) {
    .legal-page header, .legal-page article > div { padding-inline: var(--spacing-5) !important; }
    .legal-page h1 { font-size: var(--text-4xl) !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ui_kits/homepage/Navbar.jsx?v=20260752"></script>
<script src="ui_kits/shared/data/legal.js?v=20260735"></script>
<script type="text/babel" src="ui_kits/shared/common/LegalPage.jsx?v=20260738"></script>
<script type="text/babel" src="ui_kits/homepage/Footer.jsx?v=20260753"></script>
<script type="text/babel" src="ui_kits/homepage/AssessmentModal.jsx?v=20260753"></script>
<script type="text/babel">
function LegalDocPage() {
  return (
    <React.Fragment>
      <ChimeNavbar />
      <main className="legal-page">
        <ChimeLegalPage doc={window.CHIME_LEGAL["terms-conditions"]} />
      </main>
      <ChimeFooter />
      <ChimeAssessmentModal />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<LegalDocPage />);
</script>
</body>
</html>
