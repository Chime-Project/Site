<style>
  html, body { margin: 0; }
  body { background: var(--bg-default); padding-top: 72px; }
  a { color: var(--accent-strong); }
  a:hover { color: var(--accent-default); }
  @keyframes hero-float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(-1.2deg); }
  }
  @keyframes hero-kenburns {
    0%, 100% { transform: scale(1); transform-origin: 60% 40%; }
    50% { transform: scale(1.07); transform-origin: 60% 40%; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .hero-kenburns { animation: hero-kenburns 14s var(--ease-in-out) infinite; }
  }
  @keyframes hero-enter {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .hero-enter { animation: hero-enter 0.7s var(--ease-out, ease-out) both; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .hero-float { animation: hero-float 6s var(--ease-in-out) infinite; }
  }
  /* Section scroll-reveal — pure CSS scroll-driven animation (replaces the
     per-section IntersectionObserver). Where view() timelines are unsupported,
     the animation resolves to a 0s document-timeline run and rests at its end
     state (visible), so content is never stuck hidden. */
  @keyframes chime-reveal {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .reveal {
      animation: chime-reveal linear both;
      animation-timeline: view();
      animation-range: entry 2% cover 22%;
    }
  }
  /* Nav: hide the hamburger and neutralize a stale-open mobile menu on desktop
     with CSS instead of a JS resize listener. */
  @media (min-width: 961px) {
    .nav-hamburger { display: none !important; }
    .nav-mobile-menu { display: none !important; }
  }
  /* Weight Loss calculator grids — columns owned here (not Tailwind utilities)
     so they don't depend on Play-CDN utility ordering. `display:grid` still
     comes from the `grid` class on the elements. */
  .wl-calc-grid { grid-template-columns: 1fr; }
  .wl-calc-milestones { grid-template-columns: 1fr; }
  @media (min-width: 561px) { .wl-calc-milestones { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 961px) { .wl-calc-grid { grid-template-columns: minmax(260px, 340px) 1fr; } }
  /* Desktop-only video offset */
  @media (min-width: 961px) {
    .hero-card-video { object-position: calc(50% + 63px) center; }
  }
  /* Mobile / tablet constraints */
  .products-track::-webkit-scrollbar { display: none; }
  @media (max-width: 960px) {
    .products-track { grid-auto-columns: calc((100% - 16px) / 1.6) !important; }
    .products-title { font-size: var(--text-4xl) !important; }
    .products-section { padding-inline: var(--spacing-5) !important; }
    .feel-section { padding-inline: var(--spacing-5) !important; }
    .feel-title { font-size: var(--text-4xl) !important; }
    .feel-content { padding: var(--spacing-6) !important; }
    .trust-chip { font-size: var(--text-xs) !important; padding: var(--spacing-1) var(--spacing-3) !important; gap: var(--spacing-1) !important; width: 100%; box-sizing: border-box; min-width: 0; }
    .trust-chip svg { width: 13px !important; height: 13px !important; }
    .hero-card-video { object-position: left center !important; object-fit: cover !important; width: 100% !important; height: 100% !important; }
    .hero-card-title { display: none !important; }
    .hero-card-content { justify-content: flex-end !important; }
    .hero-main-grid { grid-template-columns: 1fr !important; }
    .hero-cat-grid { grid-template-columns: 1fr 1fr !important; }
    .hero-title { font-size: var(--text-5xl) !important; }
    .nav-links { display: none !important; }
    /* Mobile nav: hamburger left, logo right — nothing else */
    .nav-bar { display: flex !important; justify-content: space-between !important; align-items: center !important; }
    .nav-actions { order: -1; }
    .nav-logo { order: 2; margin-inline-start: 0 !important; }
    .nav-login { display: none !important; }
    .footer-grid { grid-template-columns: 1fr !important; }
    .hero-section { padding-inline: var(--spacing-5) !important; }
    .guide-section { padding-inline: var(--spacing-5) !important; }
    .guide-content { padding: var(--spacing-8) var(--spacing-6) !important; }
    .simple-path-section { padding-inline: var(--spacing-5) !important; }
    .simple-path-grid { grid-template-columns: 1fr 1fr !important; }
    .simple-path-title { font-size: var(--text-4xl) !important; }
    /* No scroll-reveal on this section below mobile; the JS step sweep in
       SimplePathSection.jsx opts out at this same breakpoint. */
    .simple-path-section .reveal { animation-name: none !important; }
    .testimonials-section { padding-inline: var(--spacing-5) !important; }
    .testimonials-title { font-size: var(--text-4xl) !important; }
  }
  @media (max-width: 960px) {
    .wl-title, .labs-title, .hw-title { font-size: var(--text-4xl) !important; }
    .wl-card-wide, .labs-card-wide, .hw-card-wide { grid-template-columns: 1fr !important; justify-items: center; text-align: center; padding: var(--spacing-6) !important; }
    .wl-card-pair, .labs-card-pair, .hw-card-pair { grid-template-columns: 1fr !important; }
    .labs-tier-grid { grid-template-columns: 1fr !important; }
    .labs-signals-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .hero-cat-grid { grid-template-columns: 1fr !important; }
    .hero-title { font-size: var(--text-4xl) !important; }
    .hero-section { padding-inline: var(--spacing-4) !important; }
    .simple-path-grid { grid-template-columns: 1fr !important; }
    .simple-path-section { padding-inline: var(--spacing-4) !important; }
    .testimonials-stats { grid-template-columns: 1fr !important; }
  }
</style>
