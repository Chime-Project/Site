<style>
  html, body { margin: 0; }
  body { background: var(--bg-default); padding-top: 72px; }
  a { color: var(--accent-strong); }
  a:hover { color: var(--accent-default); }

  /* ---- Assessment responsive ---- */
  @media (max-width: 560px) {
    /* Identity + height/weight grids collapse to one column (wide fields use
       1 / -1, which is safe on a single-column grid). */
    .asmt-grid2 { grid-template-columns: 1fr !important; }
    .asmt-grid2 > * { grid-column: auto !important; }
    .asmt-grid3 { grid-template-columns: 1fr 1fr 1fr !important; }
    /* Stepper: dots only; the labels have no room at 390px. */
    .asmt-step-label { display: none !important; }
    .asmt-stepper { padding-inline: var(--spacing-4) !important; }
  }
</style>
